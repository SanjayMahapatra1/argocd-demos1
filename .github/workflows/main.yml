name: CI Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - testing

  push:
    branches:
      - main

env:
  DOCKER_REPO: ${{ secrets.DOCKER_REPO }}

jobs:

# 🔹 Build + Scan Job
  build-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔹 SonarQube Scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: -Dsonar.projectKey=nginx-app

      # 🔹 Trivy Scan (Using Official Action)
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      # 🔹 Docker Build
      - name: Build Docker Image
        run: docker build -t ${{ env.DOCKER_REPO }}:${{ github.run_number }} .

      # 🔹 Trivy Image Scan
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REPO }}:${{ github.run_number }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'

      # # 🔹 Docker Push
      # - name: Docker Login
      #   run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # - name: Docker Push
      #   run: docker push ${{ env.DOCKER_REPO }}:${{ github.run_number }}

# 🔹 DEV Deployment
  deploy-dev:
    needs: build-scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Development
        run: echo "Deploying to Development"

# 🔹 TEST Deployment
  deploy-test:
    needs: build-scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testing' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Testing
        run: echo "Deploying to Testing"