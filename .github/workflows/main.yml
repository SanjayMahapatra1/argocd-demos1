name: CI Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - testing

  push:
    branches:
      - main

env:
  DOCKER_REPO: ${{ secrets.DOCKER_REPO }}

jobs:

# 🔹 Build + Scan Job
  build-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔹 SonarCloud Scan (FIXED)
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=sanjaymahapatra
            -Dsonar.organization=Sanjaya Kumar Mahapatra
            -Dsonar.host.url=https://sonarcloud.io

      # 🔹 Trivy FS Scan
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif

      # 🔹 Upload Trivy Report
      - name: Upload Trivy FS Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

      # 🔹 Docker Build
      - name: Build Docker Image
        run: docker build -t ${{ env.DOCKER_REPO }}:${{ github.run_number }} .

      # 🔹 Trivy Image Scan
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REPO }}:${{ github.run_number }}
          format: sarif
          output: trivy-image-results.sarif

      # 🔹 Upload Image Scan Report
      - name: Upload Trivy Image Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      # 🔹 Docker Login
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔹 Docker Push
      - name: Docker Push
        run: docker push ${{ env.DOCKER_REPO }}:${{ github.run_number }}

# 🔹 DEV Deployment
  deploy-dev:
    needs: build-scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Development
        run: echo "Deploying to Development"

# 🔹 TEST Deployment
  deploy-test:
    needs: build-scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testing' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Testing
        run: echo "Deploying to Testing"
